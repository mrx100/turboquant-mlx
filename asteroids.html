<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asteroids - Neon Edition</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; image-rendering: pixelated; }
#ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#score { position: absolute; top: 20px; left: 30px; color: #0ff; font-size: 28px; text-shadow: 0 0 10px #0ff, 0 0 20px #0ff; letter-spacing: 3px; }
#lives { position: absolute; top: 20px; right: 30px; color: #f0f; font-size: 28px; text-shadow: 0 0 10px #f0f, 0 0 20px #f0f; letter-spacing: 3px; }
#level { position: absolute; top: 60px; left: 30px; color: #ff0; font-size: 18px; text-shadow: 0 0 10px #ff0; letter-spacing: 2px; }
#message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 48px; text-align: center; text-shadow: 0 0 20px #fff, 0 0 40px #0ff, 0 0 80px #0ff; letter-spacing: 5px; opacity: 0; transition: opacity 0.5s; }
#message.visible { opacity: 1; }
#startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); pointer-events: all; z-index: 10; }
#startScreen h1 { font-size: 72px; color: #0ff; text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #00f, 0 0 120px #00f; letter-spacing: 15px; margin-bottom: 20px; animation: pulse 2s ease-in-out infinite; }
#startScreen p { color: #aaa; font-size: 20px; letter-spacing: 3px; margin-top: 30px; }
#startScreen .controls { color: #888; font-size: 14px; margin-top: 40px; text-align: center; line-height: 2; }
#startScreen .controls span { color: #0ff; }
#startBtn { padding: 15px 50px; font-size: 24px; background: transparent; border: 2px solid #0ff; color: #0ff; cursor: pointer; letter-spacing: 5px; text-transform: uppercase; transition: all 0.3s; margin-top: 30px; pointer-events: all; text-shadow: 0 0 10px #0ff; box-shadow: 0 0 15px rgba(0,255,255,0.3), inset 0 0 15px rgba(0,255,255,0.1); }
#startBtn:hover { background: rgba(0,255,255,0.15); box-shadow: 0 0 30px rgba(0,255,255,0.5), inset 0 0 30px rgba(0,255,255,0.2); transform: scale(1.05); }
#highScore { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #ff0; font-size: 16px; text-shadow: 0 0 10px #ff0; letter-spacing: 2px; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="score">0</div>
  <div id="lives">♥♥♥</div>
  <div id="level">WELLE 1</div>
  <div id="message"></div>
  <div id="highScore">HIGHSCORE: 0</div>
</div>
<div id="startScreen">
  <h1>ASTEROIDS</h1>
  <p style="color:#0ff; font-size:16px; letter-spacing:8px;">NEON EDITION</p>
  <button id="startBtn">START</button>
  <div class="controls">
    <span>↑</span> / <span>W</span> — Schub<br>
    <span>←</span> <span>→</span> / <span>A</span> <span>D</span> — Drehen<br>
    <span>LEERTASTE</span> — Schießen<br>
    <span>P</span> — Pause
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Audio Context
let audioCtx;
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

// Sound Synthesis
function playSound(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  
  switch(type) {
    case 'shoot': {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.15);
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(3000, now);
      filter.frequency.exponentialRampToValueAtTime(500, now + 0.15);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.15);
      break;
    }
    case 'explosion': {
      const bufferSize = audioCtx.sampleRate * 0.5;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
      }
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(2000, now);
      filter.frequency.exponentialRampToValueAtTime(100, now + 0.5);
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      source.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      source.start(now);
      break;
    }
    case 'bigExplosion': {
      const bufferSize = audioCtx.sampleRate * 1.0;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 1.5);
      }
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(3000, now);
      filter.frequency.exponentialRampToValueAtTime(50, now + 1.0);
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.5, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
      source.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      source.start(now);
      
      // Add sub bass
      const osc = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(80, now);
      osc.frequency.exponentialRampToValueAtTime(20, now + 0.8);
      g2.gain.setValueAtTime(0.3, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
      osc.connect(g2);
      g2.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.8);
      break;
    }
    case 'hit': {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.3);
      break;
    }
    case 'powerup': {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
      osc.frequency.exponentialRampToValueAtTime(800, now + 0.4);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.setValueAtTime(0.15, now + 0.2);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.4);
      break;
    }
    case 'thrust': {
      const bufferSize = audioCtx.sampleRate * 0.1;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * 0.3;
      }
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(800, now);
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      source.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      source.start(now);
      break;
    }
  }
}

// Game State
let gameRunning = false;
let gamePaused = false;
let score = 0;
let lives = 3;
let level = 1;
let highScore = parseInt(localStorage.getItem('asteroidsHighScore')) || 0;
let screenShake = 0;
let screenShakeX = 0;
let screenShakeY = 0;
let invincibleTimer = 0;
let shootCooldown = 0;
let comboCount = 0;
let comboTimer = 0;
let slowMoTimer = 0;
let slowMoFactor = 1;

document.getElementById('highScore').textContent = 'HIGHSCORE: ' + highScore;

// Stars
class Star {
  constructor() {
    this.reset();
    this.y = Math.random() * H;
  }
  reset() {
    this.x = Math.random() * W;
    this.y = -5;
    this.size = Math.random() * 2 + 0.5;
    this.speed = this.size * 0.5 + 0.2;
    this.brightness = Math.random() * 0.5 + 0.5;
    this.twinkleSpeed = Math.random() * 3 + 1;
    this.twinkleOffset = Math.random() * Math.PI * 2;
  }
  update(dt) {
    this.y += this.speed * dt * 60;
    if (this.y > H + 5) this.reset();
  }
  draw(time) {
    const twinkle = 0.5 + 0.5 * Math.sin(time * this.twinkleSpeed + this.twinkleOffset);
    const alpha = this.brightness * twinkle;
    ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

const stars = [];
for (let i = 0; i < 200; i++) stars.push(new Star());

// Nebula background
function drawNebula(time) {
  const grad = ctx.createRadialGradient(W * 0.3, H * 0.4, 0, W * 0.3, H * 0.4, W * 0.5);
  grad.addColorStop(0, 'rgba(20, 0, 60, 0.15)');
  grad.addColorStop(0.5, 'rgba(10, 0, 40, 0.08)');
  grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  
  const grad2 = ctx.createRadialGradient(W * 0.7, H * 0.6, 0, W * 0.7, H * 0.6, W * 0.4);
  grad2.addColorStop(0, 'rgba(0, 30, 60, 0.12)');
  grad2.addColorStop(0.5, 'rgba(0, 15, 40, 0.06)');
  grad2.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = grad2;
  ctx.fillRect(0, 0, W, H);
}

// Particle System
class Particle {
  constructor(x, y, vx, vy, color, life, size, type = 'circle') {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.life = life;
    this.maxLife = life;
    this.size = size;
    this.type = type;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 10;
    this.trail = [];
  }
  update(dt) {
    this.trail.push({ x: this.x, y: this.y, alpha: 1 });
    if (this.trail.length > 8) this.trail.shift();
    this.trail.forEach(t => t.alpha *= 0.85);
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vx *= 0.99;
    this.vy *= 0.99;
    this.life -= dt;
    this.rotation += this.rotSpeed * dt;
  }
  draw() {
    const alpha = Math.max(0, this.life / this.maxLife);
    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const ta = t.alpha * alpha * 0.3;
      if (ta > 0.01) {
        ctx.fillStyle = this.color.replace('1)', `${ta})`);
        ctx.beginPath();
        ctx.arc(t.x, t.y, this.size * 0.5 * (i / this.trail.length), 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Main particle
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    
    // Glow
    ctx.shadowColor = this.color;
    ctx.shadowBlur = this.size * 3;
    
    if (this.type === 'spark') {
      ctx.fillStyle = this.color;
      ctx.fillRect(-this.size, -0.5, this.size * 2, 1);
    } else if (this.type === 'ring') {
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 2;
      const r = this.size * (1 - alpha) * 3;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(0, 0, this.size * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
  get dead() { return this.life <= 0; }
}

let particles = [];

function spawnExplosion(x, y, color, count = 30, speed = 200, size = 3) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed;
    const vx = Math.cos(angle) * spd;
    const vy = Math.sin(angle) * spd;
    particles.push(new Particle(x, y, vx, vy, color, Math.random() * 1 + 0.5, Math.random() * size + 1, Math.random() > 0.5 ? 'spark' : 'circle'));
  }
  // Ring effect
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    const spd = speed * 0.5;
    particles.push(new Particle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, color, 0.6, size * 1.5, 'ring'));
  }
}

function spawnBigExplosion(x, y) {
  const colors = ['rgba(255, 100, 50, 1)', 'rgba(255, 200, 50, 1)', 'rgba(255, 255, 100, 1)', 'rgba(255, 150, 0, 1)'];
  for (let i = 0; i < 80; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * 400;
    const color = colors[Math.floor(Math.random() * colors.length)];
    particles.push(new Particle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, color, Math.random() * 1.5 + 0.3, Math.random() * 5 + 2, Math.random() > 0.3 ? 'spark' : 'circle'));
  }
  // Multiple rings
  for (let r = 0; r < 3; r++) {
    setTimeout(() => {
      for (let i = 0; i < 20; i++) {
        const angle = (i / 20) * Math.PI * 2;
        const spd = 150 + r * 80;
        particles.push(new Particle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, colors[r], 0.8, 4, 'ring'));
      }
    }, r * 100);
  }
}

// Ship
const ship = {
  x: 0, y: 0, vx: 0, vy: 0, angle: -Math.PI / 2,
  radius: 15, thrust: 0, thrusting: false,
  trail: [], invincible: false
};

function resetShip() {
  ship.x = W / 2;
  ship.y = H / 2;
  ship.vx = 0;
  ship.vy = 0;
  ship.angle = -Math.PI / 2;
  ship.thrust = 0;
  ship.trail = [];
}

function drawShip(time) {
  if (ship.invincible && Math.floor(time * 10) % 2 === 0) return;
  
  ctx.save();
  ctx.translate(ship.x, ship.y);
  ctx.rotate(ship.angle);
  
  // Glow
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 15;
  
  // Ship body
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(20, 0);
  ctx.lineTo(-14, -12);
  ctx.lineTo(-8, 0);
  ctx.lineTo(-14, 12);
  ctx.closePath();
  ctx.stroke();
  
  // Inner detail
  ctx.strokeStyle = 'rgba(0, 255, 255, 0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(10, 0);
  ctx.lineTo(-5, -6);
  ctx.lineTo(-3, 0);
  ctx.lineTo(-5, 6);
  ctx.closePath();
  ctx.stroke();
  
  // Cockpit
  ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
  ctx.beginPath();
  ctx.arc(5, 0, 3, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.restore();
  
  // Thrust flame
  if (ship.thrusting) {
    const flameLen = 15 + Math.random() * 15;
    const flameAngle = ship.angle + Math.PI;
    const fx = ship.x + Math.cos(flameAngle) * 12;
    const fy = ship.y + Math.sin(flameAngle) * 12;
    
    ctx.save();
    ctx.translate(fx, fy);
    ctx.rotate(flameAngle + Math.PI / 2);
    
    const grad = ctx.createLinearGradient(0, 0, 0, flameLen);
    grad.addColorStop(0, 'rgba(255, 200, 50, 0.9)');
    grad.addColorStop(0.3, 'rgba(255, 100, 20, 0.7)');
    grad.addColorStop(1, 'rgba(255, 50, 0, 0)');
    
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(-4, 0);
    ctx.lineTo(4, 0);
    ctx.lineTo(1, flameLen);
    ctx.lineTo(-1, flameLen);
    ctx.closePath();
    ctx.fill();
    
    ctx.shadowColor = '#f80';
    ctx.shadowBlur = 20;
    ctx.fillStyle = 'rgba(255, 255, 100, 0.5)';
    ctx.beginPath();
    ctx.moveTo(-2, 0);
    ctx.lineTo(2, 0);
    ctx.lineTo(0.5, flameLen * 0.6);
    ctx.lineTo(-0.5, flameLen * 0.6);
    ctx.closePath();
    ctx.fill();
    
    ctx.restore();
    
    // Thrust particles
    if (Math.random() > 0.3) {
      const spread = 0.5;
      const pAngle = flameAngle + (Math.random() - 0.5) * spread;
      const pSpeed = 100 + Math.random() * 100;
      particles.push(new Particle(
        fx, fy,
        Math.cos(pAngle) * pSpeed,
        Math.sin(pAngle) * pSpeed,
        `rgba(255, ${150 + Math.random()*100}, ${Math.random()*50}, 1)`,
        Math.random() * 0.5 + 0.2,
        Math.random() * 2 + 1,
        'circle'
      ));
    }
  }
  
  // Ship trail
  ship.trail.push({ x: ship.x, y: ship.y, alpha: 1 });
  if (ship.trail.length > 15) ship.trail.shift();
  ship.trail.forEach((t, i) => {
    t.alpha *= 0.9;
    ctx.fillStyle = `rgba(0, 255, 255, ${t.alpha * 0.15})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
    ctx.fill();
  });
}

// Bullet
class Bullet {
  constructor(x, y, angle) {
    this.x = x; this.y = y;
    this.speed = 600;
    this.vx = Math.cos(angle) * this.speed + ship.vx * 0.3;
    this.vy = Math.sin(angle) * this.speed + ship.vy * 0.3;
    this.life = 1.5;
    this.radius = 2;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.life -= dt;
    // Trail
    particles.push(new Particle(this.x, this.y, 0, 0, 'rgba(0, 255, 255, 1)', 0.3, 1.5, 'circle'));
  }
  draw() {
    ctx.save();
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0, 255, 255, 0.5)';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  get dead() { return this.life <= 0 || this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20; }
}

let bullets = [];

// Asteroid
class Asteroid {
  constructor(x, y, size, vx, vy) {
    this.x = x; this.y = y;
    this.size = size; // 3=large, 2=medium, 1=small
    this.radius = size * 18 + 10;
    this.vx = vx || (Math.random() - 0.5) * 100;
    this.vy = vy || (Math.random() - 0.5) * 100;
    this.rotation = 0;
    this.rotSpeed = (Math.random() - 0.5) * 3;
    this.vertices = [];
    this.generateShape();
    
    const colors = ['#f0f', '#f0a', '#a0f', '#f5f', '#c0f'];
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.glowColor = this.color;
  }
  generateShape() {
    const numVerts = 8 + Math.floor(Math.random() * 6);
    for (let i = 0; i < numVerts; i++) {
      const angle = (i / numVerts) * Math.PI * 2;
      const r = this.radius * (0.7 + Math.random() * 0.3);
      this.vertices.push({ angle, r });
    }
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.rotation += this.rotSpeed * dt;
    
    // Wrap
    if (this.x < -this.radius) this.x = W + this.radius;
    if (this.x > W + this.radius) this.x = -this.radius;
    if (this.y < -this.radius) this.y = H + this.radius;
    if (this.y > H + this.radius) this.y = -this.radius;
  }
  draw(time) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    
    ctx.shadowColor = this.glowColor;
    ctx.shadowBlur = 10 + this.size * 3;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    
    ctx.beginPath();
    this.vertices.forEach((v, i) => {
      const x = Math.cos(v.angle) * v.r;
      const y = Math.sin(v.angle) * v.r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.stroke();
    
    // Inner glow
    ctx.strokeStyle = this.color.replace(')', ', 0.2)').replace('rgb', 'rgba');
    ctx.lineWidth = 1;
    ctx.beginPath();
    this.vertices.forEach((v, i) => {
      const x = Math.cos(v.angle) * v.r * 0.6;
      const y = Math.sin(v.angle) * v.r * 0.6;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.stroke();
    
    ctx.restore();
  }
  split() {
    if (this.size > 1) {
      const count = 2;
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 80 + Math.random() * 120;
        asteroids.push(new Asteroid(
          this.x, this.y, this.size - 1,
          Math.cos(angle) * speed + this.vx * 0.5,
          Math.sin(angle) * speed + this.vy * 0.5
        ));
      }
    }
  }
}

let asteroids = [];

function spawnAsteroids(count) {
  for (let i = 0; i < count; i++) {
    let x, y;
    do {
      x = Math.random() * W;
      y = Math.random() * H;
    } while (dist(x, y, ship.x, ship.y) < 200);
    asteroids.push(new Asteroid(x, y, 3));
  }
}

function dist(x1, y1, x2, y2) {
  return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
}

// Power-ups
class PowerUp {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.type = type; // 'rapid', 'shield', 'bomb'
    this.radius = 12;
    this.life = 10;
    this.angle = 0;
    this.pulse = 0;
  }
  update(dt) {
    this.life -= dt;
    this.angle += 2 * dt;
    this.pulse += 5 * dt;
  }
  draw(time) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    
    const pulseSize = 1 + 0.2 * Math.sin(this.pulse);
    ctx.scale(pulseSize, pulseSize);
    
    let color, symbol;
    switch(this.type) {
      case 'rapid': color = '#ff0'; symbol = '»'; break;
      case 'shield': color = '#0f0'; symbol = '◆'; break;
      case 'bomb': color = '#f00'; symbol = '��'; break;
    }
    
    ctx.shadowColor = color;
    ctx.shadowBlur = 20;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    
    // Diamond shape
    ctx.beginPath();
    ctx.moveTo(0, -this.radius);
    ctx.lineTo(this.radius, 0);
    ctx.lineTo(0, this.radius);
    ctx.lineTo(-this.radius, 0);
    ctx.closePath();
    ctx.stroke();
    
    ctx.fillStyle = color;
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(symbol, 0, 0);
    
    ctx.restore();
  }
  get dead() { return this.life <= 0; }
}

let powerUps = [];

// Input
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyP' && gameRunning) {
    gamePaused = !gamePaused;
    if (gamePaused) showMessage('PAUSE', 1000);
    else hideMessage();
  }
  if (e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// UI
function updateUI() {
  document.getElementById('score').textContent = score.toString().padStart(6, '0');
  let heartsStr = '';
  for (let i = 0; i < lives; i++) heartsStr += '♥';
  document.getElementById('lives').textContent = heartsStr;
  document.getElementById('level').textContent = 'WELLE ' + level;
}

function showMessage(text, duration = 2000) {
  const msg = document.getElementById('message');
  msg.textContent = text;
  msg.classList.add('visible');
  if (duration > 0) setTimeout(hideMessage, duration);
}

function hideMessage() {
  document.getElementById('message').classList.remove('visible');
}

// Combo display
let comboDisplay = [];
function addCombo(x, y, count) {
  comboDisplay.push({ x, y, count, life: 1.5, maxLife: 1.5 });
}

// Game Logic
function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  initAudio();
  score = 0;
  lives = 3;
  level = 1;
  asteroids = [];
  bullets = [];
  particles = [];
  powerUps = [];
  comboDisplay = [];
  comboCount = 0;
  comboTimer = 0;
  resetShip();
  invincibleTimer = 3;
  spawnAsteroids(4 + level);
  gameRunning = true;
  gamePaused = false;
  showMessage('WELLE 1', 1500);
  updateUI();
}

function nextLevel() {
  level++;
  spawnAsteroids(4 + level + Math.floor(level / 2));
  showMessage('WELLE ' + level, 1500);
  updateUI();
}

function playerHit() {
  lives--;
  spawnBigExplosion(ship.x, ship.y);
  playSound('bigExplosion');
  screenShake = 0.5;
  invincibleTimer = 3;
  ship.invincible = true;
  ship.vx = 0;
  ship.vy = 0;
  ship.x = W / 2;
  ship.y = H / 2;
  playSound('hit');
  
  if (lives <= 0) {
    gameOver();
  }
  updateUI();
}

function gameOver() {
  gameRunning = false;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('asteroidsHighScore', highScore);
    document.getElementById('highScore').textContent = 'HIGHSCORE: ' + highScore;
    showMessage('GAME OVER\nNEUER HIGHSCORE!', 5000);
  } else {
    showMessage('GAME OVER', 3000);
  }
  
  setTimeout(() => {
    document.getElementById('startScreen').style.display = 'flex';
    document.getElementById('startBtn').textContent = 'NEUSTART';
  }, 3000);
}

let lastThrustSound = 0;

function update(dt) {
  if (!gameRunning || gamePaused) return;
  
  const effectiveDt = dt * slowMoFactor;
  
  // Slow motion
  if (slowMoTimer > 0) {
    slowMoTimer -= dt;
    slowMoFactor = 0.3;
  } else {
    slowMoFactor = 1;
  }
  
  // Input
  const turnSpeed = 4;
  if (keys['ArrowLeft'] || keys['KeyA']) ship.angle -= turnSpeed * effectiveDt;
  if (keys['ArrowRight'] || keys['KeyD']) ship.angle += turnSpeed * effectiveDt;
  
  ship.thrusting = keys['ArrowUp'] || keys['KeyW'];
  if (ship.thrusting) {
    const thrustForce = 300;
    ship.vx += Math.cos(ship.angle) * thrustForce * effectiveDt;
    ship.vy += Math.sin(ship.angle) * thrustForce * effectiveDt;
    
    // Thrust particles
    if (Math.random() > 0.5) {
      const exhaustAngle = ship.angle + Math.PI + (Math.random() - 0.5) * 0.6;
      const exhaustSpeed = 80 + Math.random() * 60;
      particles.push(new Particle(
        ship.x - Math.cos(ship.angle) * 12,
        ship.y - Math.sin(ship.angle) * 12,
        Math.cos(exhaustAngle) * exhaustSpeed,
        Math.sin(exhaustAngle) * exhaustSpeed,
        `rgba(255, ${100 + Math.random()*150}, 0, 1)`,
        Math.random() * 0.4 + 0.1,
        Math.random() * 2 + 1,
        'circle'
      ));
    }
    
    // Thrust sound
    lastThrustSound += dt;
    if (lastThrustSound > 0.15) {
      playSound('thrust');
      lastThrustSound = 0;
    }
  } else {
    lastThrustSound = 0;
  }
  
  // Friction
  ship.vx *= 0.998;
  ship.vy *= 0.998;
  
  // Speed limit
  const maxSpeed = 400;
  const speed = Math.sqrt(ship.vx ** 2 + ship.vy ** 2);
  if (speed > maxSpeed) {
    ship.vx = (ship.vx / speed) * maxSpeed;
    ship.vy = (ship.vy / speed) * maxSpeed;
  }
  
  ship.x += ship.vx * effectiveDt;
  ship.y += ship.vy * effectiveDt;
  
  // Wrap ship
  if (ship.x < -20) ship.x = W + 20;
  if (ship.x > W + 20) ship.x = -20;
  if (ship.y < -20) ship.y = H + 20;
  if (ship.y > H + 20) ship.y = -20;
  
  // Shooting
  shootCooldown -= dt;
  if ((keys['Space'] || keys['KeyF']) && shootCooldown <= 0) {
    const bulletSpeed = 600;
    bullets.push(new Bullet(
      ship.x + Math.cos(ship.angle) * 20,
      ship.y + Math.sin(ship.angle) * 20,
      ship.angle
    ));
    bullets.push(new Bullet(
      ship.x + Math.cos(ship.angle) * 20,
      ship.y + Math.sin(ship.angle) * 20,
      ship.angle + 0.05
    ));
    bullets.push(new Bullet(
      ship.x + Math.cos(ship.angle) * 20,
      ship.y + Math.sin(ship.angle) * 20,
      ship.angle - 0.05
    ));
    shootCooldown = 0.18;
    playSound('shoot');
  }
  
  // Invincibility
  if (invincibleTimer > 0) {
    invincibleTimer -= dt;
    ship.invincible = true;
  } else {
    ship.invincible = false;
  }
  
  // Update bullets
  bullets.forEach(b => b.update(effectiveDt));
  bullets = bullets.filter(b => !b.dead);
  
  // Update asteroids
  asteroids.forEach(a => a.update(effectiveDt));
  
  // Update particles
  particles.forEach(p => p.update(dt));
  particles = particles.filter(p => !p.dead);
  
  // Update power-ups
  powerUps.forEach(p => p.update(dt));
  powerUps = powerUps.filter(p => !p.dead);
  
  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }
  
  // Update combo display
  comboDisplay.forEach(c => c.life -= dt);
  comboDisplay = comboDisplay.filter(c => c.life > 0);
  
  // Screen shake
  if (screenShake > 0) {
    screenShake -= dt;
    screenShakeX = (Math.random() - 0.5) * screenShake * 30;
    screenShakeY = (Math.random() - 0.5) * screenShake * 30;
  } else {
    screenShakeX = 0;
    screenShakeY = 0;
  }
  
  // Collision: Bullet vs Asteroid
  for (let i = bullets.length - 1; i >= 0; i--) {
    for (let j = asteroids.length - 1; j >= 0; j--) {
      if (dist(bullets[i].x, bullets[i].y, asteroids[j].x, asteroids[j].y) < asteroids[j].radius + 5) {
        // Hit!
        const a = asteroids[j];
        const points = (4 - a.size) * 50 * (1 + comboCount * 0.5);
        score += Math.floor(points);
        comboCount++;
        comboTimer = 2;
        addCombo(a.x, a.y, comboCount);
        
        spawnExplosion(a.x, a.y, a.color, 20 + a.size * 10, 150 + a.size * 50, 3);
        playSound('explosion');
        screenShake = 0.15;
        
        // Chance to spawn power-up
        if (Math.random() < 0.08) {
          const types = ['rapid', 'shield', 'bomb'];
          powerUps.push(new PowerUp(a.x, a.y, types[Math.floor(Math.random() * types.length)]));
        }
        
        a.split();
        asteroids.splice(j, 1);
        bullets.splice(i, 1);
        updateUI();
        break;
      }
    }
  }
  
  // Collision: Ship vs Asteroid
  if (!ship.invincible) {
    for (let j = asteroids.length - 1; j >= 0; j--) {
      if (dist(ship.x, ship.y, asteroids[j].x, asteroids[j].y) < asteroids[j].radius + ship.radius - 5) {
        playerHit();
        asteroids[j].split();
        asteroids.splice(j, 1);
        break;
      }
    }
  }
  
  // Collision: Ship vs Power-up
  for (let i = powerUps.length - 1; i >= 0; i--) {
    if (dist(ship.x, ship.y, powerUps[i].x, powerUps[i].y) < powerUps[i].radius + ship.radius) {
      const pu = powerUps[i];
      playSound('powerup');
      switch(pu.type) {
        case 'rapid':
          shootCooldown = -2; // Rapid fire for 2 seconds
          showMessage('RASCHE FEUER!', 1000);
          break;
        case 'shield':
          invincibleTimer = 5;
          showMessage('SCHILD AKTIV!', 1000);
          break;
        case 'bomb':
          asteroids.forEach(a => {
            spawnExplosion(a.x, a.y, a.color, 15, 100, 3);
            score += 25;
          });
          asteroids = [];
          playSound('bigExplosion');
          screenShake = 0.8;
          showMessage('BOMBE!', 1000);
          break;
      }
      spawnExplosion(pu.x, pu.y, '#fff', 15, 100, 2);
      powerUps.splice(i, 1);
      updateUI();
    }
  }
  
  // Check level complete
  if (asteroids.length === 0) {
    nextLevel();
  }
}

function draw(time) {
  ctx.clearRect(0, 0, W, H);
  
  // Background
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);
  
  drawNebula(time);
  
  // Stars
  stars.forEach(s => { s.update(1/60); s.draw(time); });
  
  ctx.save();
  ctx.translate(screenShakeX, screenShakeY);
  
  // Particles (behind)
  particles.filter(p => p.type === 'ring').forEach(p => p.draw());
  
  // Power-ups
  powerUps.forEach(p => p.draw(time));
  
  // Asteroids
  asteroids.forEach(a => a.draw(time));
  
  // Bullets
  bullets.forEach(b => b.draw());
  
  // Ship
  if (gameRunning) drawShip(time);
  
  // Particles (front)
  particles.filter(p => p.type !== 'ring').forEach(p => p.draw());
  
  // Combo display
  comboDisplay.forEach(c => {
    const alpha = c.life / c.maxLife;
    const yOff = (1 - alpha) * 40;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ff0';
    ctx.shadowColor = '#ff0';
    ctx.shadowBlur = 10;
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`x${c.count} COMBO!`, c.x, c.y - yOff);
    ctx.restore();
  });
  
  // Vignette
  ctx.restore();
  const vignette = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.7);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);
  
  // Scanline effect
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for (let y = 0; y < H; y += 3) {
    ctx.fillRect(0, y, W, 1);
  }
}

// Game Loop
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  
  const time = timestamp / 1000;
  
  update(dt);
  draw(time);
  
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

// Start button
document.getElementById('startBtn').addEventListener('click', startGame);
</script>
